# Third-party APT repos that aren't on Launchpad and aren't already
# handled by a dedicated role. Each entry installs a GPG key into
# /etc/apt/keyrings/<name>.gpg and adds a deb line in
# /etc/apt/sources.list.d/<name>.list referencing it via signed-by=.
#
# Repos handled elsewhere (do NOT add them here):
#   1password         → roles/onepassword
#   brave-browser     → roles/brave
#   docker            → roles/docker
#   github-desktop    → roles/github_desktop
#   google-chrome     → roles/google_chrome
#   hashicorp/vagrant → roles/vagrant
apt_third_party_repos:
  - name: nvidia-container-toolkit
    key_url: https://nvidia.github.io/libnvidia-container/gpgkey
    repo: "deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /"
  - name: stripe
    key_url: https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public
    repo: "deb [signed-by=/etc/apt/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main"
  - name: virtualbox
    key_url: https://www.virtualbox.org/download/oracle_vbox_2016.asc
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/virtualbox.gpg] http://download.virtualbox.org/virtualbox/debian {{ ansible_distribution_release }} contrib"
# vscode is NOT here - it has a dedicated `vscode` role. Reason: the
# `code` package's postinst writes its own /etc/apt/sources.list.d/vscode.list
# referencing /usr/share/keyrings/microsoft.gpg. If we also register the
# repo via apt_third_party_repos (which writes a deb822 .sources file
# referencing /etc/apt/keyrings/vscode.gpg), apt sees a dual registration
# with conflicting Signed-By values and breaks every future apt update.

