# MacBook Pro - LLM Agent Machine
# Minimal setup: shared shell config, git, node, chrome, claude
# No dev tools (neovim, vscode, cursor, docker) or personal config (myconfig, crontab)

- name: macOS Agent Setup
  hosts: osx_agent
  gather_facts: true
  roles:
    - { role: macos_cleanup, tags: [macos_cleanup] }
    - { role: macos_server, tags: [macos_server] }
    - { role: dotfiles, tags: [dotfiles] }
    - { role: git_config, tags: [git_config] }
    - { role: tmux, tags: [tmux] }
    - { role: node, tags: [node] }
    - { role: npm_packages, tags: [npm_packages] }
    - { role: hosts_file, tags: [hosts_file] }
    - { role: claude, tags: [claude] }
    - { role: homebrew, tags: [homebrew] }
    - { role: mapcapsescape, tags: [mapcapsescape] }
    - { role: osx_config, tags: [osx_config] }
    - { role: watchdog_report, tags: [watchdog_report] }
    - { role: sysinfo, tags: [sysinfo] }
