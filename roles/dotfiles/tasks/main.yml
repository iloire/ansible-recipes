- name: dotfiles checkout
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: ~/dotfiles
    accept_hostkey: true
    ssh_opts: "-o ForwardAgent=yes"

- name: oh my zsh checkout
  ansible.builtin.git:
    repo: "https://github.com/ohmyzsh/ohmyzsh.git"
    dest: ~/.oh-my-zsh

- name: check existing zshrc
  ansible.builtin.stat:
    path: "~/.zshrc"
  register: existing_zshrc

- name: backup existing zshrc if it's a regular file
  ansible.builtin.copy:
    src: "~/.zshrc"
    dest: "~/.zshrc.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_zshrc.stat.exists and not existing_zshrc.stat.islnk

- name: creating symlink for zshrc
  ansible.builtin.file:
    src: "~/dotfiles/shell/zshrc"
    dest: "~/.zshrc"
    state: link
    force: true

- name: check if dotfiles ssh config exists
  ansible.builtin.stat:
    path: "~/dotfiles/ssh/config"
  register: dotfiles_ssh_config

- name: ensure ~/.ssh/sockets directory exists
  ansible.builtin.file:
    path: "~/.ssh/sockets"
    state: directory
    mode: "0700"
  when: dotfiles_ssh_config.stat.exists and (dotfiles_link_ssh_config | default(true))

- name: check existing ssh config
  ansible.builtin.stat:
    path: "~/.ssh/config"
  register: existing_ssh_config

- name: backup existing ssh config if it's a regular file
  ansible.builtin.copy:
    src: "~/.ssh/config"
    dest: "~/.ssh/config.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_ssh_config.stat.exists and not existing_ssh_config.stat.islnk

- name: creating symlink for ssh config
  ansible.builtin.file:
    src: "~/dotfiles/ssh/config"
    dest: "~/.ssh/config"
    state: link
    force: true
  when: dotfiles_ssh_config.stat.exists and (dotfiles_link_ssh_config | default(true))

- name: check existing npmrc
  ansible.builtin.stat:
    path: "~/.npmrc"
  register: existing_npmrc

- name: backup existing npmrc if it's a regular file
  ansible.builtin.copy:
    src: "~/.npmrc"
    dest: "~/.npmrc.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_npmrc.stat.exists and not existing_npmrc.stat.islnk

- name: creating symlink for npmrc
  ansible.builtin.file:
    src: "~/dotfiles/npm/npmrc"
    dest: "~/.npmrc"
    state: link
    force: true
