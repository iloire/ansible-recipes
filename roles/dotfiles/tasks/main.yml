- name: dotfiles checkout
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: ~/dotfiles
    accept_hostkey: true
    ssh_opts: "-o ForwardAgent=yes"

- name: oh my zsh checkout
  ansible.builtin.git:
    repo: "https://github.com/ohmyzsh/ohmyzsh.git"
    dest: ~/.oh-my-zsh

- name: check existing zshrc
  ansible.builtin.stat:
    path: "~/.zshrc"
  register: existing_zshrc

- name: backup existing zshrc if it's a regular file
  ansible.builtin.copy:
    src: "~/.zshrc"
    dest: "~/.zshrc.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_zshrc.stat.exists and not existing_zshrc.stat.islnk

- name: creating symlink for zshrc
  ansible.builtin.file:
    src: "~/dotfiles/shell/zshrc"
    dest: "~/.zshrc"
    state: link
    force: true

- name: check if dotfiles ssh config exists
  ansible.builtin.stat:
    path: "~/dotfiles/ssh/config"
  register: dotfiles_ssh_config

- name: ensure ~/.ssh/sockets directory exists
  ansible.builtin.file:
    path: "~/.ssh/sockets"
    state: directory
    mode: "0700"
  when: dotfiles_ssh_config.stat.exists and (dotfiles_link_ssh_config | default(true))

- name: check existing ssh config
  ansible.builtin.stat:
    path: "~/.ssh/config"
  register: existing_ssh_config

- name: backup existing ssh config if it's a regular file
  ansible.builtin.copy:
    src: "~/.ssh/config"
    dest: "~/.ssh/config.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_ssh_config.stat.exists and not existing_ssh_config.stat.islnk

- name: creating symlink for ssh config
  ansible.builtin.file:
    src: "~/dotfiles/ssh/config"
    dest: "~/.ssh/config"
    state: link
    force: true
  when: dotfiles_ssh_config.stat.exists and (dotfiles_link_ssh_config | default(true))

- name: check existing npmrc
  ansible.builtin.stat:
    path: "~/.npmrc"
  register: existing_npmrc

- name: backup existing npmrc if it's a regular file
  ansible.builtin.copy:
    src: "~/.npmrc"
    dest: "~/.npmrc.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_npmrc.stat.exists and not existing_npmrc.stat.islnk

- name: creating symlink for npmrc
  ansible.builtin.file:
    src: "~/dotfiles/npm/npmrc"
    dest: "~/.npmrc"
    state: link
    force: true

- name: check if host-specific motd-local exists
  ansible.builtin.stat:
    path: "~/dotfiles/shell/motd-local.{{ inventory_hostname }}"
  register: motd_local_file

- name: symlink host-specific motd-local
  ansible.builtin.file:
    src: "~/dotfiles/shell/motd-local.{{ inventory_hostname }}"
    dest: "~/dotfiles/shell/motd-local"
    state: link
    force: true
  when: motd_local_file.stat.exists

# XDG autostart entries — symlink everything in dotfiles/xdg/autostart/
# into ~/.config/autostart/ so login-time services come up on a fresh box.
- name: ensure ~/.config/autostart exists
  ansible.builtin.file:
    path: "~/.config/autostart"
    state: directory
    mode: "0755"

- name: list autostart .desktop files in dotfiles
  ansible.builtin.find:
    paths: "~/dotfiles/xdg/autostart"
    patterns: "*.desktop"
    file_type: file
  register: dotfiles_autostart_entries

- name: symlink autostart .desktop files into ~/.config/autostart
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "~/.config/autostart/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ dotfiles_autostart_entries.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

# Personal/commercial fonts shipped with dotfiles — copy (not symlink, so
# fc-cache picks them up cleanly) into ~/.local/share/fonts/ and refresh
# the font cache.
- name: check if dotfiles fonts directory exists
  ansible.builtin.stat:
    path: "~/dotfiles/fonts"
  register: dotfiles_fonts_dir

- name: ensure ~/.local/share/fonts exists
  ansible.builtin.file:
    path: "~/.local/share/fonts"
    state: directory
    mode: "0755"
  when: dotfiles_fonts_dir.stat.exists

- name: list font files in dotfiles
  ansible.builtin.find:
    paths: "~/dotfiles/fonts"
    patterns:
      - "*.ttf"
      - "*.otf"
    file_type: file
  register: dotfiles_fonts
  when: dotfiles_fonts_dir.stat.exists

- name: copy fonts into ~/.local/share/fonts
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "~/.local/share/fonts/{{ item.path | basename }}"
    remote_src: true
    mode: "0644"
    force: false
  loop: "{{ dotfiles_fonts.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: dotfiles_fonts_copied

- name: refresh font cache
  ansible.builtin.command: fc-cache -f ~/.local/share/fonts
  when: dotfiles_fonts_copied is changed
  changed_when: false

# Right-click "New Document" templates — Nautilus reads from ~/Templates.
# Symlink the dotfiles directory there if the user has no existing
# regular-file Templates dir (don't clobber).
- name: check if dotfiles Templates directory exists
  ansible.builtin.stat:
    path: "~/dotfiles/Templates"
  register: dotfiles_templates_dir

- name: check existing ~/Templates
  ansible.builtin.stat:
    path: "~/Templates"
  register: existing_templates

- name: symlink ~/Templates -> ~/dotfiles/Templates
  ansible.builtin.file:
    src: "~/dotfiles/Templates"
    dest: "~/Templates"
    state: link
    force: true
  when:
    - dotfiles_templates_dir.stat.exists
    - not existing_templates.stat.exists or existing_templates.stat.islnk
