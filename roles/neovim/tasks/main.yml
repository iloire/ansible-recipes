- name: Create apps directory
  ansible.builtin.file:
    path: "~/apps"
    state: directory
    mode: "0755"
  when: ansible_system == 'Linux'

- name: download neovim appimage
  ansible.builtin.get_url:
    url: "https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.appimage"
    dest: "~/apps/nvim"
    mode: "770"
  when: ansible_system == 'Linux'

- name: ensure .config directory exists
  ansible.builtin.file:
    path: "~/.config"
    state: directory

- name: check existing neovim config
  ansible.builtin.stat:
    path: "~/.config/nvim"
  register: existing_nvim_config

- name: backup existing neovim config if it's not a symlink
  ansible.builtin.command:
    cmd: "cp -a ~/.config/nvim ~/.config/nvim.backup.{{ ansible_date_time.iso8601_basic_short }}"
  when: existing_nvim_config.stat.exists and not existing_nvim_config.stat.islnk

- name: creating symlink for neovim config
  ansible.builtin.file:
    src: "~/dotfiles/nvim"
    dest: "~/.config/nvim"
    state: link
    force: true
