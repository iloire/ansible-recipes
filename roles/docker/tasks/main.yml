- name: update repositories
  ansible.builtin.apt:
    update_cache: true
  become: true

- name: ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: add Docker apt signing key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/ubuntu/gpg"
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"
    force: false
  become: true

- name: set the stable docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
    state: present
    filename: docker
  become: true

- name: install docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  become: true

- name: Ensure group "docker" exists
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: adding existing user to group docker
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  register: add_to_docker_group_result
  become: true

- name: Reset connection to pick up new group membership
  meta: reset_connection
  when: add_to_docker_group_result.changed

- name: configure Docker daemon (log rotation, storage driver)
  copy:
    content: "{{ docker_daemon_config | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart docker
