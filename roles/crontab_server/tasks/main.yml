- name: Creates an entry like "PATH=/usr/local/bin"
  ansible.builtin.cron:
    name: PATH
    env: yes
    job: /usr/local/bin:/usr/bin:/bin:/usr/sbin

- name: monitor low space in disk
  ansible.builtin.cron:
    name: "disk space monitor"
    minute: "20"
    hour: "*/6"
    job: ". $HOME/dotfiles/shell/local-overrides; $HOME/dotfiles/bin/low-space-monitor.sh"

- name: docker cleanup
  ansible.builtin.cron:
    name: "docker cleanup"
    minute: "0"
    hour: "4"
    job: ". $HOME/dotfiles/shell/local-overrides; $HOME/dotfiles/bin/docker-cleanup.sh"

- name: send watchdog event on reboot
  ansible.builtin.cron:
    name: "watchdog server reboot"
    special_time: reboot
    job: >-
      sleep 30;
      . $HOME/dotfiles/shell/local-overrides;
      WATCHDOG_NOTIFY=true
      WATCHDOG_ICON=🔄
      $HOME/dotfiles/bin/send-watchdog "server" "server.reboot" "warning" "$(hostname) has restarted"

- name: send server health report to watchdog
  ansible.builtin.cron:
    name: "watchdog server health report"
    minute: "*/15"
    job: ". $HOME/dotfiles/shell/local-overrides; $HOME/dotfiles/bin/send-watchdog-report"

- name: scan kernel logs and docker state for concerning events
  ansible.builtin.cron:
    name: "watchdog system health check"
    minute: "5"
    job: ". $HOME/dotfiles/shell/local-overrides; $HOME/dotfiles/bin/check-system-health"

- name: check external disk health
  ansible.builtin.cron:
    name: "watchdog external disk check"
    minute: "0"
    hour: "*/12"
    job: ". $HOME/dotfiles/shell/local-overrides; $HOME/dotfiles/bin/check-external-disk"
  when: external_disk_monitor | default(false)
