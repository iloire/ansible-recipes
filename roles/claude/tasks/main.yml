- name: Ensure .claude directory exists
  ansible.builtin.file:
    path: "~/.claude"
    state: directory
    mode: '0755'

- name: check if dotfiles claude dir exists
  ansible.builtin.stat:
    path: "~/dotfiles/claude"
  register: dotfiles_claude

- name: check existing CLAUDE.md
  ansible.builtin.stat:
    path: "~/.claude/CLAUDE.md"
  register: existing_claude_md

- name: backup existing CLAUDE.md if it's a regular file
  ansible.builtin.copy:
    src: "~/.claude/CLAUDE.md"
    dest: "~/.claude/CLAUDE.md.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_claude_md.stat.exists and not existing_claude_md.stat.islnk

- name: Creating symlink for CLAUDE.md
  ansible.builtin.file:
    src: "~/dotfiles/claude/CLAUDE.md"
    dest: "~/.claude/CLAUDE.md"
    state: link
    force: true
  when: dotfiles_claude.stat.exists

- name: check existing claude settings.json
  ansible.builtin.stat:
    path: "~/.claude/settings.json"
  register: existing_claude_settings

- name: backup existing claude settings.json if it's a regular file
  ansible.builtin.copy:
    src: "~/.claude/settings.json"
    dest: "~/.claude/settings.json.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_claude_settings.stat.exists and not existing_claude_settings.stat.islnk

- name: Creating symlink for settings.json
  ansible.builtin.file:
    src: "~/dotfiles/claude/settings.json"
    dest: "~/.claude/settings.json"
    state: link
    force: true
  when: dotfiles_claude.stat.exists
