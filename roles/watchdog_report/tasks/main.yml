- name: Remove legacy crontab entries
  ansible.builtin.command:
    cmd: crontab -r
  failed_when: false
  changed_when: false

- name: Install watchdog report launchd plist
  ansible.builtin.template:
    src: com.watchdog.report.plist.j2
    dest: ~/Library/LaunchAgents/com.watchdog.report.plist
    mode: "0644"

- name: Load watchdog report launchd agent
  ansible.builtin.command:
    cmd: launchctl load ~/Library/LaunchAgents/com.watchdog.report.plist
  register: launchctl_result
  changed_when: launchctl_result.rc == 0
  failed_when: false
