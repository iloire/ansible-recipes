- name: check if dotfiles git config exists
  ansible.builtin.stat:
    path: "~/dotfiles/git/.gitconfig"
  register: dotfiles_gitconfig

- name: check existing git config
  ansible.builtin.stat:
    path: "~/.gitconfig"
  register: existing_gitconfig

- name: backup existing git config if it's a regular file
  ansible.builtin.copy:
    src: "~/.gitconfig"
    dest: "~/.gitconfig.backup.{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
  when: existing_gitconfig.stat.exists and not existing_gitconfig.stat.islnk

- name: creating symlink for git config
  ansible.builtin.file:
    src: "~/dotfiles/git/.gitconfig"
    dest: "~/.gitconfig"
    state: link
    force: true
  when: dotfiles_gitconfig.stat.exists

- name: create git identity override
  ansible.builtin.copy:
    content: |
      [user]
        name = {{ git_user_name }}
        email = {{ git_user_email }}
    dest: "~/.gitconfig.local"
    mode: "0644"
  when: git_user_name | length > 0

- name: get latest gitleaks version
  ansible.builtin.uri:
    url: https://api.github.com/repos/gitleaks/gitleaks/releases/latest
    return_content: true
  register: gitleaks_release
  when: ansible_os_family == "Debian"

- name: set gitleaks download url
  ansible.builtin.set_fact:
    gitleaks_version: "{{ gitleaks_release.json.tag_name | regex_replace('^v', '') }}"
  when: ansible_os_family == "Debian"

- name: download and install gitleaks (github release)
  become: true
  ansible.builtin.unarchive:
    src: "https://github.com/gitleaks/gitleaks/releases/download/v{{ gitleaks_version }}/gitleaks_{{ gitleaks_version }}_linux_{{ 'arm64' if ansible_architecture == 'aarch64' else 'x64' }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - gitleaks
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: install gitleaks (brew)
  community.general.homebrew:
    name: gitleaks
    state: present
  when: ansible_os_family == "Darwin"
