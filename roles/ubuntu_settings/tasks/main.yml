- name: Gnome theme
  shell: gsettings set org.gnome.desktop.interface gtk-theme 'Yaru-bark-dark'

- name: dark theme
  shell: gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
  ignore_errors: true

- name: fav apps
  dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: "['org.gnome.Nautilus.desktop', 'firefox_firefox.desktop', 'google-chrome.desktop', 'libreoffice-writer.desktop', 'terminator.desktop', 'brave-browser.desktop', '1password.desktop', 'spotify_spotify.desktop', 'telegram.desktop']"

- name: set US-intl + Spanish keyboard layouts
  dconf:
    key: "/org/gnome/desktop/input-sources/sources"
    value: "[('xkb', 'us+altgr-intl'), ('xkb', 'es')]"

- name: caps -> escape (nvim) + Alt+Shift to toggle layouts
  dconf:
    key: "/org/gnome/desktop/input-sources/xkb-options"
    value: "['caps:escape', 'grp:alt_shift_toggle']"

- name: blank screen delay
  dconf:
    key: "/org/gnome/desktop/session/idle-delay"
    value: "uint32 900"

- name: Keyboard delay
  community.general.dconf:
    key: '/org/gnome/desktop/peripherals/keyboard/delay'
    value: 'uint32 230'

- name: Keyboard repeat interval
  community.general.dconf:
    key: '/org/gnome/desktop/peripherals/keyboard/repeat-interval'
    value: 'uint32 25'

- name: Enable night-light
  community.general.dconf:
    key: '/org/gnome/settings-daemon/plugins/color/night-light-enabled'
    value: 'true'

- name: Enable night-light automatic shedule
  community.general.dconf:
    key: '/org/gnome/settings-daemon/plugins/color/night-light-schedule-automatic'
    value: 'true'

- name: Set night-light temperature
  community.general.dconf:
    key: '/org/gnome/settings-daemon/plugins/color/night-light-temperature'
    value: 'uint32 2700'

- name: Disable system sounds
  community.general.dconf:
    key: '/org/gnome/desktop/sound/event-sounds'
    value: 'false'

- name: Register custom keybindings
  community.general.dconf:
    key: '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings'
    value: "['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/']"

- name: Screenshot to clipboard - name
  community.general.dconf:
    key: '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/name'
    value: "'Screenshot to clipboard'"

- name: Screenshot to clipboard - command
  community.general.dconf:
    key: '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/command'
    value: "'flameshot gui --clipboard'"

- name: Screenshot to clipboard - binding
  community.general.dconf:
    key: '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/binding'
    value: "'<Super><Shift>4'"

# --- Window manager / workspaces ---------------------------------------
# Ivan uses fixed workspaces (not GNOME's default dynamic ones) — 7 of
# them, mirrored across all monitors. This is core to his window
# habits; without it the smart-auto-move extension and the workspace
# muscle memory don't work.

- name: disable dynamic workspaces (use fixed count)
  community.general.dconf:
    key: '/org/gnome/mutter/dynamic-workspaces'
    value: 'false'

- name: workspaces span all monitors (not just primary)
  community.general.dconf:
    key: '/org/gnome/mutter/workspaces-only-on-primary'
    value: 'false'

- name: number of workspaces
  community.general.dconf:
    key: '/org/gnome/desktop/wm/preferences/num-workspaces'
    value: '7'

# --- Interface tweaks ---------------------------------------------------
- name: disable hot corners (Activities trigger on top-left)
  community.general.dconf:
    key: '/org/gnome/desktop/interface/enable-hot-corners'
    value: 'false'

- name: hide weekday in clock
  community.general.dconf:
    key: '/org/gnome/desktop/interface/clock-show-weekday'
    value: 'false'

- name: cursor theme DMZ-Black
  community.general.dconf:
    key: '/org/gnome/desktop/interface/cursor-theme'
    value: "'DMZ-Black'"

- name: font hinting slight
  community.general.dconf:
    key: '/org/gnome/desktop/interface/font-hinting'
    value: "'slight'"

# --- Dash-to-dock (Ubuntu's bottom launcher) ---------------------------
- name: dash-to-dock smaller icons
  community.general.dconf:
    key: '/org/gnome/shell/extensions/dash-to-dock/dash-max-icon-size'
    value: '40'

- name: dash-to-dock pin to DP-0 monitor by connector name
  community.general.dconf:
    key: '/org/gnome/shell/extensions/dash-to-dock/preferred-monitor-by-connector'
    value: "'DP-0'"

# --- GNOME shell extensions --------------------------------------------
# These two extension states require the extensions to be installed
# separately (via Extension Manager — flatpak com.mattjakeman.ExtensionManager
# is in flatpak_packages). Setting them here is harmless if the extension
# isn't installed yet — the keys just sit in dconf inert.
- name: enable smart-auto-move extension
  community.general.dconf:
    key: '/org/gnome/shell/enabled-extensions'
    value: "['smart-auto-move@khimaros.com']"

- name: disable blur-my-shell extension
  community.general.dconf:
    key: '/org/gnome/shell/disabled-extensions'
    value: "['blur-my-shell@aunetx']"

# --- smart-auto-move extension config ----------------------------------
# Saves window positions across reboots/extension reloads. The defaults
# are slightly suboptimal — these settings are the result of trial.
- name: smart-auto-move sync mode RESTORE
  community.general.dconf:
    key: '/org/gnome/shell/extensions/smart-auto-move/sync-mode'
    value: "'RESTORE'"

- name: smart-auto-move startup delay
  community.general.dconf:
    key: '/org/gnome/shell/extensions/smart-auto-move/startup-delay'
    value: '2500'

- name: smart-auto-move save frequency
  community.general.dconf:
    key: '/org/gnome/shell/extensions/smart-auto-move/save-frequency'
    value: '1000'

- name: smart-auto-move match threshold
  community.general.dconf:
    key: '/org/gnome/shell/extensions/smart-auto-move/match-threshold'
    value: '0.7'

- name: smart-auto-move activate workspace on restore
  community.general.dconf:
    key: '/org/gnome/shell/extensions/smart-auto-move/activate-workspace'
    value: 'true'

# --- Nautilus (file manager) -------------------------------------------
- name: nautilus default to list view
  community.general.dconf:
    key: '/org/gnome/nautilus/preferences/default-folder-viewer'
    value: "'list-view'"

- name: nautilus search uses list view
  community.general.dconf:
    key: '/org/gnome/nautilus/preferences/search-view'
    value: "'list-view'"

- name: nautilus search by last-modified time
  community.general.dconf:
    key: '/org/gnome/nautilus/preferences/search-filter-time-type'
    value: "'last_modified'"

- name: nautilus default compression format zip
  community.general.dconf:
    key: '/org/gnome/nautilus/compression/default-compression-format'
    value: "'zip'"

- name: nautilus show hidden files by default
  community.general.dconf:
    key: '/org/gnome/nautilus/preferences/show-hidden-files'
    value: 'true'

- name: file-chooser show hidden files by default
  community.general.dconf:
    key: '/org/gtk/settings/file-chooser/show-hidden'
    value: 'true'

- name: file-chooser sort directories first
  community.general.dconf:
    key: '/org/gtk/settings/file-chooser/sort-directories-first'
    value: 'true'

- name: nautilus list view shows tree expansion
  community.general.dconf:
    key: '/org/gnome/nautilus/list-view/use-tree-view'
    value: 'true'

- name: nautilus path bar always editable (Ctrl+L always-on)
  community.general.dconf:
    key: '/org/gnome/nautilus/preferences/always-use-location-entry'
    value: 'true'

- name: nautilus recursive search local-folder only (faster on huge dirs)
  community.general.dconf:
    key: '/org/gnome/nautilus/preferences/recursive-search'
    value: "'local-only'"
