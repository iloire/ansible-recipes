# RTK (Rust Token Killer) - reduces LLM token consumption by filtering verbose CLI output
# https://github.com/rtk-ai/rtk

- name: check if rtk is installed
  ansible.builtin.stat:
    path: /usr/local/bin/rtk
  register: rtk_bin

- name: install rtk
  when: not rtk_bin.stat.exists
  block:
    - name: get latest rtk version
      ansible.builtin.uri:
        url: https://api.github.com/repos/rtk-ai/rtk/releases/latest
        return_content: yes
      register: rtk_release

    - name: download and extract rtk
      ansible.builtin.unarchive:
        src: "https://github.com/rtk-ai/rtk/releases/download/{{ rtk_release.json.tag_name }}/rtk-x86_64-unknown-linux-musl.tar.gz"
        dest: /usr/local/bin
        remote_src: yes
        include: rtk
      become: true

- name: initialize rtk for Claude Code
  ansible.builtin.command: rtk init -g --auto-patch
  args:
    creates: ~/.claude/hooks/rtk-rewrite.sh
