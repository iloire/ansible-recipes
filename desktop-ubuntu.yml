- name: Ubuntu Desktop Setup
  hosts: linux
  gather_facts: true
  roles:
    - { role: dotfiles, tags: [dotfiles] }
    - { role: myconfig, tags: [myconfig] }
    - { role: tmux, tags: [tmux] }
    - { role: git_config, tags: [git_config] }
    - { role: zsh, tags: [zsh] }
    - { role: node, tags: [node] }
    - { role: npm_packages, tags: [npm_packages] }
    - { role: crontab, tags: [crontab] }
    - { role: hosts_file, tags: [hosts_file] }
    - { role: apt_minimum, tags: [apt_minimum] }
    - { role: apt, tags: [apt] }
    - { role: modern_cli_tools, tags: [modern_cli_tools] }
    - { role: build_essentials, tags: [build_essentials] }
    - { role: ubuntu_settings, tags: [ubuntu_settings] }
    - { role: autostart, tags: [autostart] }
    - { role: docker, tags: [docker] }
    - { role: xdg_desktop, tags: [xdg_desktop] }
    - { role: neovim, tags: [neovim] }
    - { role: lazygit, tags: [lazygit] }
    - { role: github_desktop, tags: [github_desktop] }
    - { role: cursor_config, tags: [cursor_config] }
    - { role: google_chrome, tags: [google_chrome] }
    - { role: brave, tags: [brave] }
    - { role: snap, tags: [snap] }
    - { role: flatpak, tags: [flatpak] }
    - { role: geek_fonts, tags: [geek_fonts] }
    - { role: terminator, tags: [terminator] }
    - { role: vagrant, tags: [vagrant] }
    - { role: onepassword, tags: [onepassword] }
    - { role: qmk, tags: [qmk] }
    - { role: alacritty_config, tags: [alacritty_config] }
    - { role: anaconda, tags: [anaconda] }
    - { role: vscode_config, tags: [vscode_config] }
    - { role: whisper_cpp, tags: [whisper_cpp] }
    - { role: whispertux, tags: [whispertux] }
    - { role: sysinfo, tags: [sysinfo] }
    - { role: rtk, tags: [rtk] }
